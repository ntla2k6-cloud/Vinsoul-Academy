<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinsoul Academy – Quản Lý Trung Tâm</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<!-- Thư viện Export & Icons -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body data-theme="default">

<div id="vs-app" style="display:none">

<!-- HEADER MOBILE (Chỉ hiện trên điện thoại) -->
<div class="mobile-header">
    <button class="hamburger-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div class="mobile-logo">VINSOUL ACADEMY</div>
    <button class="theme-btn" onclick="toggleThemeModal()"><i class="fa-solid fa-palette"></i></button>
</div>

<!-- MÀN CHẮN SIDEBAR MOBILE -->
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- MODAL THANH TOÁN VIETQR -->
<div class="modal-backdrop" id="vietqr-modal" onclick="if(event.target===this) document.getElementById('vietqr-modal').classList.remove('open')">
    <div class="modal" style="max-width:350px; text-align:center;">
        <button class="modal-close" onclick="document.getElementById('vietqr-modal').classList.remove('open')">✕</button>
        <h3 style="color:var(--navy); font-family:'Playfair Display',serif;">Mã Thanh Toán QR</h3>
        <p style="font-size:12px; color:var(--muted); margin-bottom:15px;">Vietcombank - HKD VINSOUL - 1731238888</p>
        <div id="qr-image-container" style="background:#fff; padding:10px; border-radius:10px; display:inline-block; border: 2px solid var(--gold);">
            <img id="vietqr-img" src="" alt="VietQR" style="width:250px; height:250px; object-fit:contain;">
        </div>
        <div style="margin-top:15px; background:var(--cream); padding:10px; border-radius:8px; text-align:left;">
            <div style="font-size:12px; font-weight:bold;">Nội dung CK: <span id="qr-desc" style="color:var(--red);"></span></div>
            <div style="font-size:12px; font-weight:bold;">Số tiền: <span id="qr-amount" style="color:var(--gold);"></span></div>
        </div>
    </div>
</div>

<!-- THEME PICKER -->
<div class="modal-backdrop" id="theme-modal" onclick="if(event.target===this) toggleThemeModal()">
    <div class="modal" style="max-width:300px; text-align:center;">
        <h3 style="color:var(--navy); margin-bottom: 15px;">Chọn Giao Diện</h3>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="color-btn" style="background:#234A5B;" onclick="changeTheme('default')"></button>
            <button class="color-btn" style="background:#5C4033;" onclick="changeTheme('coffee')"></button>
            <button class="color-btn" style="background:#1B4D3E;" onclick="changeTheme('forest')"></button>
            <button class="color-btn" style="background:#1A1A1D;" onclick="changeTheme('dark')"></button>
        </div>
    </div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar" id="main-sidebar">
  <div class="logo-area">
    <div class="logo-icon">🎵</div>
    <div>
      <div class="logo-title" style="font-family:'Be Vietnam Pro',sans-serif;letter-spacing:1px;font-size:17px;font-weight:900;color:#fff;">VINSOUL</div>
      <div class="logo-sub">Âm Nhạc & Nghệ Thuật</div>
    </div>
  </div>
  <div class="sidebar-inner">
    <div class="nav-section">
      <div class="nav-label">Tổng Quan</div>
      <div class="nav-item active" onclick="showPage('dashboard')"><span class="nav-icon">◈</span> Dashboard</div>
      <div class="nav-item hidden-mobile" onclick="toggleThemeModal()"><span class="nav-icon">🎨</span> Giao Diện</div>
    </div>
    <!-- GIỮ NGUYÊN CÁC NAV ITEM CỦA BẠN NHƯ CŨ (Học Viên, Lớp học, v.v...) -->
    <div class="nav-section" id="nav-system" style="display:none">
      <div class="nav-label">Hệ Thống</div>
      <div class="nav-item" onclick="showPage('accounts')"><span class="nav-icon">🔑</span> Tài Khoản</div>
      <div class="nav-item" onclick="showPage('auditlogs')"><span class="nav-icon">📜</span> Nhật Ký (Log)</div>
    </div>
  </div>
  <div style="padding:14px 16px; border-top:1px solid rgba(246,153,34,.15);">
      <div id="sidebar-user-name" style="font-size:13px; font-weight:700; color:#fff;">–</div>
      <button onclick="VS_AUTH.logout()" style="width:100%; margin-top:10px; background:rgba(217,79,79,.15); border:1px solid rgba(217,79,79,.3); color:#ff8080; border-radius:8px; padding:7px; font-size:12px; cursor:pointer;">Đăng Xuất</button>
  </div>
</aside>

<!-- MAIN APP -->
<main class="main">
    <!-- TRANG DASHBOARD -->
    <div id="page-dashboard" class="page active">
        <div class="welcome-banner"><div><div class="welcome-title">Xin chào 👋</div></div></div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Học Viên</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-paid">0</div><div class="stat-label">Đã Thanh Toán</div></div>
        </div>
    </div>

    <!-- CÁC TRANG HTML KHÁC CỦA BẠN NẰM Ở ĐÂY (About, Students, Classes...) -->
</main>

<div class="toast" id="toast">✓ <span id="toast-msg"></span></div>
</div>

<script src="auth.js"></script>
<script src="app.js"></script>
<script>
// Logic Mobile Sidebar
function toggleSidebar() { 
    document.getElementById('main-sidebar').classList.toggle('open'); 
    document.getElementById('sidebar-overlay').classList.toggle('show'); 
}
// Logic Theme
function toggleThemeModal() { document.getElementById('theme-modal').classList.toggle('open'); }
function changeTheme(theme) { document.body.setAttribute('data-theme', theme); localStorage.setItem('vinsoul_theme', theme); toggleThemeModal(); }
window.onload = () => { const t = localStorage.getItem('vinsoul_theme'); if(t) document.body.setAttribute('data-theme', t); };
</script>
</body>
</html>
